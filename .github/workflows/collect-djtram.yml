name: Collect Daejeon tram traffic

on:
  schedule:
    # Offset from the top of the hour to reduce peak-time scheduling delays.
    - cron: "7,17,27,37,47,57 * * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: write

concurrency:
  group: djtram-cloud-collector
  cancel-in-progress: false

env:
  COLLECTION_END_AT: "2026-07-21T04:00:00Z"
  COLLECTION_RELEASE: cloud-collector-state

jobs:
  collect:
    # The official Daejeon host times out from the Ubuntu-hosted runner pool.
    # Windows uses a different hosted pool while keeping collection on GitHub.
    runs-on: windows-latest
    timeout-minutes: 8
    steps:
      - name: Check collection window
        id: window
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          end_epoch=$(date -u -d "$COLLECTION_END_AT" +%s)
          now_epoch=$(date -u +%s)
          if [ "$now_epoch" -ge "$end_epoch" ]; then
            echo "collect=false" >> "$GITHUB_OUTPUT"
            echo "Collection window ended at $COLLECTION_END_AT; disabling this workflow."
            gh workflow disable collect-djtram.yml --repo "$GITHUB_REPOSITORY"
          else
            echo "collect=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out collector code
        if: steps.window.outputs.collect == 'true'
        uses: actions/checkout@v6

      - name: Set up Python
        if: steps.window.outputs.collect == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Restore latest collector state
        if: steps.window.outputs.collect == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          mkdir -p .collector-state data/raw data/processed
          if gh release download "$COLLECTION_RELEASE" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "collector-state.tar.gz" \
            --dir .collector-state; then
            state_archive=.collector-state/collector-state.tar.gz
          elif gh release download "$COLLECTION_RELEASE" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "collector-state.previous.tar.gz" \
            --dir .collector-state; then
            state_archive=.collector-state/collector-state.previous.tar.gz
          else
            echo "No prior collector state found; starting from an empty database."
            state_archive=
          fi

          if [ -n "$state_archive" ]; then
            tar -xzf "$state_archive"
          fi

      - name: Install collector
        if: steps.window.outputs.collect == 'true'
        run: python -m pip install --disable-pip-version-check -e .

      - name: Collect one snapshot and validate it
        if: steps.window.outputs.collect == 'true'
        shell: bash
        run: |
          mkdir -p collector
          python -m taekbae collect-djtram --zones 1,12 \
            | tee collector/latest-collection.json
          python -m taekbae quality > collector/latest-quality.json

      - name: Preserve current and previous collector states
        if: steps.window.outputs.collect == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tar -czf collector-state.tar.gz \
            data/raw \
            data/processed/traffic.sqlite \
            collector/latest-collection.json \
            collector/latest-quality.json

          if [ -f .collector-state/collector-state.tar.gz ]; then
            cp .collector-state/collector-state.tar.gz collector-state.previous.tar.gz
            gh release upload "$COLLECTION_RELEASE" \
              collector-state.previous.tar.gz \
              --clobber \
              --repo "$GITHUB_REPOSITORY"
          elif [ -f .collector-state/collector-state.previous.tar.gz ]; then
            cp .collector-state/collector-state.previous.tar.gz collector-state.previous.tar.gz
            gh release upload "$COLLECTION_RELEASE" \
              collector-state.previous.tar.gz \
              --clobber \
              --repo "$GITHUB_REPOSITORY"
          fi

          gh release upload "$COLLECTION_RELEASE" \
            collector-state.tar.gz \
            --clobber \
            --repo "$GITHUB_REPOSITORY"
